<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños, Mi Amor!</title>
    <style>
        body {
            /* This removes any annoying white borders around the edge of the screen */
            margin: 0;
            padding: 0;
            /* This centers your card perfectly in the middle of the screen */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* We match the soft pink background color of your image */
            background-color: #f7cdcb; 
        }

        .card-image {
            /* Ensures the card doesn't get wider than 600px, which looks best on mobile and desktop */
            max-width: 600px;
            /* Makes sure it fits completely on smaller screens */
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <img src="Kevin.jpg" alt="Feliz Cumpleaños Card" class="card-image">

</body>
</html>
